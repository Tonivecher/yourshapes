name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: webapp-pure-form-7dzsf1
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: webapp-pure-form-7dzsf1
        run: bun run build:website
        env:
          CI: false
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Verify dist
        working-directory: webapp-pure-form-7dzsf1
        run: |
          test -d apps/website/dist || (echo "::error::apps/website/dist не создан"; exit 1)
          ls -la apps/website/dist

      - name: Lint
        working-directory: webapp-pure-form-7dzsf1/apps/website
        run: bun run lint

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp-pure-form-7dzsf1/apps/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
